services:
  - type: web
    name: code-review-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      # Make sure to set GROQ_API_KEY or GOOGLE_API_KEY in the Render Dashboard!
